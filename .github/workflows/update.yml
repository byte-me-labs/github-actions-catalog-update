name: Update Actions Dataset

on:
  schedule:
    - cron: "37 */2 * * 6,0" # Every 2 hours on Saturday & Sunday
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 115
    steps:
      - name: Checkout catalog
        uses: actions/checkout@v7
        with:
          repository: byte-me-labs/github-actions-catalog
          token: ${{ secrets.ACTIONS_PAT }}
          path: catalog

      - name: Download indexer binary
        uses: robinraju/release-downloader@v1
        with:
          repository: byte-me-labs/github-actions-indexer
          token: ${{ secrets.ACTIONS_PAT }}
          latest: true
          fileName: update-actions-linux-amd64
          out-file-path: catalog/.github/bin

      - name: Make executable
        run: chmod +x catalog/.github/bin/update-actions-linux-amd64

      - name: Restore state cache
        id: cache-restore
        uses: actions/cache/restore@v6
        with:
          path: catalog/.github/data
          key: backfill-state-${{ github.run_id }}
          restore-keys: |
            backfill-state-

      - name: Run indexer
        working-directory: catalog
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_PAT }}
        run: .github/bin/update-actions-linux-amd64 -group-count 10

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v6
        with:
          path: catalog/.github/data
          key: backfill-state-${{ github.run_id }}

      - name: Check merge status
        id: merge
        run: |
          if [ -f catalog/.github/data/.merge-done ]; then
            echo "done=true" >> $GITHUB_OUTPUT
          else
            echo "done=false" >> $GITHUB_OUTPUT
          fi

      - name: Verify dataset file
        if: steps.merge.outputs.done == 'true'
        id: verify
        run: |
          if [ -f catalog/actions-versions.json ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
            echo "Dataset file found, ready to push."
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "::warning::Merge done but actions-versions.json not found!"
            ls -la catalog/ || true
          fi

      - name: Push dataset
        if: steps.verify.outputs.ready == 'true'
        working-directory: catalog
        env:
          ACTIONS_PAT: ${{ secrets.ACTIONS_PAT }}
        run: |
          git config user.name "actions-bot"
          git config user.email "bot@actions.dev"
          git remote set-url origin "https://x-access-token:${ACTIONS_PAT}@github.com/byte-me-labs/github-actions-catalog.git"
          git add actions-versions.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update actions dataset [skip ci]"

          pushed=false
          for i in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $i"
              pushed=true
              break
            fi
            delay=$((2**i * 10))
            echo "Push attempt $i failed, retrying in ${delay}s..."
            sleep $delay
          done

          if [ "$pushed" != "true" ]; then
            echo "::error::Push failed after 3 attempts"
            exit 1
          fi

      - name: Sync to skills registry
        if: steps.verify.outputs.ready == 'true'
        run: |
          npx --yes skills@1.5.14 add byte-me-labs/github-actions-catalog -y
        continue-on-error: true
